version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: financeiroapp-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financeiroapp
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeiroapp-backend
    restart: always
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/financeiroapp?schema=public
      - GEMINI_API_KEY=AIzaSyAnJRqCLNtBbG32bjcmbUY0DpWFEC7jUyc
      - JWT_SECRET=super-super-secret-key

  # Frontend Service (Nginx Proxy)
  frontend:
    build:
      context: ./financeiro
      dockerfile: Dockerfile
    container_name: financeiroapp-frontend
    restart: always
    depends_on:
      - backend


volumes:
  postgres-data:

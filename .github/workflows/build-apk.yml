name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: financeiro/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd financeiro
          npm ci

      - name: Build Web Application
        run: |
          cd financeiro
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor Platforms
        run: |
          cd financeiro
          npm install @capacitor/android
          npx cap add android
          node inject-permissions.cjs
          npx @capacitor/assets generate
          npx cap sync

      - name: Build Android APK (Debug)
        run: |
          cd financeiro/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceiroApp-APK
          path: financeiro/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

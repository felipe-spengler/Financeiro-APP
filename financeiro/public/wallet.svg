<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#walletGrad)" />
  <g filter="url(#shadow)">
    <!-- Wallet body -->
    <rect x="96" y="144" width="320" height="224" rx="32" fill="#0f172a" />
    <!-- Wallet cover fold -->
    <path d="M 96,176 L 416,176 C 416,176 384,240 320,240 L 96,240 Z" fill="#1e293b" />
    <!-- Wallet flap -->
    <rect x="304" y="216" width="112" height="80" rx="16" fill="#3b82f6" />
    <!-- Flap button -->
    <circle cx="344" cy="256" r="16" fill="#ffffff" />
    <!-- Gold coins / currency symbols emerging slightly -->
    <path d="M 160,112 C 160,80 192,80 192,112 L 208,112 C 208,64 144,64 144,112 Z" fill="#fbbf24" opacity="0.8" />
    <path d="M 224,96 C 224,72 248,72 248,96 L 260,96 C 260,56 212,56 212,96 Z" fill="#f59e0b" opacity="0.9" />
  </g>
</svg>
